# mise config - https://mise.jdx.dev
# Provides env + task runner for scribe. Run `mise trust` once.
#
# Python is pinned via mise (no flake needed). On NixOS this needs mise
# >= 2026.6.10: older mise picked the `freethreaded-...-stripped` python-build-
# standalone asset and aborted with "Python installation is missing a `lib`
# directory" (a mise asset-selection bug, NOT a nix-ld/ELF problem — the
# prebuilt CPython runs fine via the FHS loader nix-ld provides). 2026.6.10+
# picks the plain `install_only_stripped` asset and installs cleanly.
# `[settings] python.compile = false` forces the prebuilt download. mise detects
# /etc/NIXOS and would otherwise source-compile (the env var MISE_PYTHON_COMPILE
# is NOT honored at install time — it must be a setting). Same lever as node's
# `node.compile = false` in the global mise config.

[settings]
python.compile = false      # prebuilt CPython download (see header)
python.uv_venv_auto = true  # create the project .venv with `uv venv`, not `python -m venv`

[tools]
python = "3.13"
uv = "latest"             # venv + installer; aqua static binary (system uv exists, but pin it here)
ruff = "latest"           # linter/formatter — aqua static binary (no nix-ld needed)
node = "lts"              # only needed by pyright (npm backend); prebuilt via nix-ld
"npm:pyright" = "latest"  # type checker (not in mise registry; installed via npm)

[env]
# Auto-create + activate a project venv on `cd` (mise uses `uv venv` per
# python.uv_venv_auto above). .venv is gitignored. Populate it with `mise run
# dev`: the editable `scribe` install pulls the faster-whisper runtime dep, plus
# pytest from the `[dev]` extra. (capture is stdlib-only; transcribe needs it.)
_.python.venv = { path = ".venv", create = true }

# Recordings live INSIDE the repo (gitignored). {{config_root}} = repo root.
SCRIBE_RECORDINGS_DIR = "{{config_root}}/recordings"

[tasks.capture]
description = "Record meeting audio (follows default device live)"
run = "python -m scribe capture"

[tasks.transcribe]
description = "Transcribe a meeting (faster-whisper; default: latest recording)"
run = "python -m scribe transcribe"

[tasks.summarize]
description = "[planned] LLM summary"
run = "python -m scribe summarize"

# --- dev ---------------------------------------------------------------------
# ruff + pyright come from [tools] above, so `lint`/`typecheck` need no install.
# `dev` populates the venv with the editable package (pulls faster-whisper) +
# pytest; `test` runs on the stdlib (mocks faster-whisper) and needs nothing.
[tasks.dev]
description = "Install deps into the venv (editable scribe + faster-whisper + pytest) via uv"
run = "uv pip install -e '.[dev]'"

[tasks.test]
description = "Run the test suite (stdlib unittest, zero deps; real-audio e2e skipped)"
run = "python -m unittest discover -s tests"

# Real-audio e2e: runs faster-whisper on the tiny committed fixture clip.
# Needs `mise run dev` first (faster-whisper) + a one-time `tiny` model download.
[tasks.test-e2e]
description = "Run the real-audio e2e (faster-whisper on the fixture clip)"
run = "SCRIBE_E2E=1 python -m unittest tests.test_transcribe_e2e -v"

[tasks.lint]
description = "Lint with ruff"
run = "ruff check ."

[tasks.typecheck]
description = "Type-check with pyright"
run = "pyright"
